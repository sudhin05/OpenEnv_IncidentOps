name: incident_ops_env
version: 0.1.0
description: Deterministic incident response triage environment with seeded tasks.
entrypoint: server.app:app
endpoints:
  reset: /reset
  step: /step
  state: /state
models:
  observation: server.models.IncidentObservation
  action: server.models.IncidentAction
  state: server.models.IncidentState
  reward: server.models.StepReward
tasks:
  - id: easy
    file: server/tasks/easy_incident.json
  - id: medium
    file: server/tasks/medium_incident.json
  - id: hard
    file: server/tasks/hard_incident.json