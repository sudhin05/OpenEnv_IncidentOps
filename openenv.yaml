name: incident_ops_env
version: 0.1.0
description: Deterministic incident response triage environment with seeded tasks.
entrypoint: app.server:app
endpoints:
  reset: /reset
  step: /step
  state: /state
models:
  observation: app.models.IncidentObservation
  action: app.models.IncidentAction
  state: app.models.IncidentState
  reward: app.models.StepReward
tasks:
  - id: easy
    file: app/tasks/easy_incident.json
  - id: medium
    file: app/tasks/medium_incident.json
  - id: hard
    file: app/tasks/hard_incident.json
